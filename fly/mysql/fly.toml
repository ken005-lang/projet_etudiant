# fly/mysql/fly.toml — Application MySQL séparée
app            = "mon-app-db"
primary_region = "cdg"

[build]
  image = "mysql:8.4"

[env]
  MYSQL_DATABASE = "laravel"

[[services]]
  internal_port = 3306
  protocol      = "tcp"

[[mounts]]
  source      = "mysql_data"
  destination = "/var/lib/mysql"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

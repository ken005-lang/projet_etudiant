# fly.toml — Application Laravel principale
app            = "mon-app"
primary_region = "cdg"
kill_signal    = "SIGINT"
kill_timeout   = "5s"

# ════════════════════════════════════════════════════════════════════
# BUILD
# ════════════════════════════════════════════════════════════════════
[build]
  dockerfile = "Dockerfile"
  [build.args]
    PHP_VERSION  = "8.4"
    NODE_VERSION = "22"

# ════════════════════════════════════════════════════════════════════
# VARIABLES D'ENVIRONNEMENT (non sensibles)
# ════════════════════════════════════════════════════════════════════
[env]
  APP_ENV   = "production"
  APP_DEBUG = "false"
  APP_URL   = "https://mon-app.fly.dev"

  # Base de données (MySQL app Fly.io)
  DB_CONNECTION = "mysql"
  DB_HOST       = "mon-app-db.internal"
  DB_PORT       = "3306"
  DB_DATABASE   = "laravel"

  # Redis (Redis app Fly.io)
  REDIS_HOST = "mon-app-redis.internal"
  REDIS_PORT = "6379"

  # Cache, Sessions, Queue via Redis
  CACHE_STORE      = "redis"
  SESSION_DRIVER   = "redis"
  SESSION_LIFETIME = "120"
  QUEUE_CONNECTION = "redis"

  # Broadcasting — Reverb
  BROADCAST_CONNECTION = "reverb"
  REVERB_APP_ID        = "mon-app"
  REVERB_HOST          = "0.0.0.0"
  REVERB_PORT          = "8080"
  REVERB_SCHEME        = "https"

  # Reverb côté client (navigateur)
  VITE_REVERB_HOST    = "mon-app.fly.dev"
  VITE_REVERB_PORT    = "443"
  VITE_REVERB_SCHEME  = "https"

  # Mail
  MAIL_MAILER = "smtp"

  # Logs
  LOG_CHANNEL = "stderr"
  LOG_LEVEL   = "error"

  # Session
  SESSION_SECURE_COOKIE = "true"

# ════════════════════════════════════════════════════════════════════
# SERVICE HTTP — Application web principale
# ════════════════════════════════════════════════════════════════════
[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["web"]

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 400

# ════════════════════════════════════════════════════════════════════
# PROCESSUS — Groupes de processus
# ════════════════════════════════════════════════════════════════════
[processes]
  web = "php-fpm"

  worker = "php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-jobs=500 --max-time=3600"

  scheduler = "php /var/www/html/artisan schedule:work"

  reverb = "php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=9000 --env=production"

# ════════════════════════════════════════════════════════════════════
# MACHINES — Ressources allouées par groupe
# ════════════════════════════════════════════════════════════════════
[[vm]]
  processes  = ["web"]
  memory     = "1gb"
  cpu_kind   = "shared"
  cpus       = 1

[[vm]]
  processes  = ["worker"]
  memory     = "512mb"
  cpu_kind   = "shared"
  cpus       = 1

[[vm]]
  processes  = ["scheduler"]
  memory     = "256mb"
  cpu_kind   = "shared"
  cpus       = 1

[[vm]]
  processes  = ["reverb"]
  memory     = "512mb"
  cpu_kind   = "shared"
  cpus       = 1

# ════════════════════════════════════════════════════════════════════
# HEALTH CHECKS
# ════════════════════════════════════════════════════════════════════
[[http_service.checks]]
  grace_period        = "10s"
  interval            = "30s"
  method              = "GET"
  path                = "/up"
  protocol            = "http"
  timeout             = "5s"
  tls_skip_verify     = false
  [http_service.checks.headers]
    User-Agent = "Fly-Health-Check"

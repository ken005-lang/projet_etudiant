# render.yaml - Blueprint Infrastructure-as-Code pour Render
# 
# ⚠️  IMPORTANT :
# - PostgreSQL Database doit être créée MANUELLEMENT via Dashboard Render
# - Render a changé ses plans PostgreSQL et le Blueprint les supporte mal
# - Redis et Web Service sont créés automatiquement par ce Blueprint
# - Après "Apply", créez la PostgreSQL DB manuellement :
#   Dashboard → New → PostgreSQL → Frankfurt region → Gratuit ou payant

services:
  # ────────────────────────────────────────────────────────────
  # REDIS KEY VALUE
  # ────────────────────────────────────────────────────────────
  - type: keyvalue
    name: mon-app-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ────────────────────────────────────────────────────────────
  # WEB SERVICE - Application Laravel
  # ────────────────────────────────────────────────────────────
  - type: web
    name: mon-app
    runtime: docker
    region: frankfurt
    plan: starter
    branch: master
    healthCheckPath: /up

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_URL
        value: https://mon-app.onrender.com

      - key: LOG_CHANNEL
        value: stderr

      - key: SESSION_SECURE_COOKIE
        value: true

      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        value: ""  # À remplir après création manuelle de la DB

      - key: DB_PORT
        value: "5432"

      - key: DB_DATABASE
        value: laravel

      - key: DB_USERNAME
        value: laravel

      - key: DB_PASSWORD
        value: ""  # À remplir après création manuelle de la DB

      - key: REDIS_HOST
        fromService:
          name: mon-app-redis
          type: keyvalue
          property: host

      - key: REDIS_PORT
        fromService:
          name: mon-app-redis
          type: keyvalue
          property: port

      - key: CACHE_STORE
        value: redis

      - key: SESSION_DRIVER
        value: redis

      - key: QUEUE_CONNECTION
        value: redis

      - key: APP_KEY
        sync: false

      - key: MAIL_HOST
        sync: false

      - key: MAIL_PASSWORD
        sync: false

# render.yaml - Blueprint Infrastructure-as-Code pour Render
# 
# ⚠️  IMPORTANT :
# - Workers et Cron Jobs doivent être créés MANUELLEMENT via le Dashboard Render
# - Le Blueprint Blueprint ne supporte pas les workers/cron avec Docker runtime
# - Cf. https://render.com/docs/background-workers

databases:
  - name: mon-app-db
    databaseName: laravel
    user: laravel
    plan: starter
    region: frankfurt
    ipAllowList: []

services:
  # ────────────────────────────────────────────────────────────
  # REDIS KEY VALUE
  # ────────────────────────────────────────────────────────────
  - type: keyvalue
    name: mon-app-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ────────────────────────────────────────────────────────────
  # WEB SERVICE - Application Laravel
  # ────────────────────────────────────────────────────────────
  - type: web
    name: mon-app
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    healthCheckPath: /up

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_URL
        value: https://mon-app.onrender.com

      - key: LOG_CHANNEL
        value: stderr

      - key: SESSION_SECURE_COOKIE
        value: true

      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        fromDatabase:
          name: mon-app-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: mon-app-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: mon-app-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: mon-app-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: mon-app-db
          property: password

      - key: REDIS_HOST
        fromService:
          name: mon-app-redis
          type: keyvalue
          property: host

      - key: REDIS_PORT
        fromService:
          name: mon-app-redis
          type: keyvalue
          property: port

      - key: CACHE_STORE
        value: redis

      - key: SESSION_DRIVER
        value: redis

      - key: QUEUE_CONNECTION
        value: redis

      - key: APP_KEY
        sync: false

      - key: MAIL_HOST
        sync: false

      - key: MAIL_PASSWORD
        sync: false
